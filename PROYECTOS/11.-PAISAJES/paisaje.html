<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paisajes</title>
    <link rel="stylesheet" href="../estilo-proyecto.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: radial-gradient(circle at top, #36516b 0%, #101319 56%, #050608 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 40px;
        }
        .barra {
            position: fixed;
            inset: 0 0 auto 0;
            height: 68px;
            padding: 0 8%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.78);
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .barra a { color: white; text-decoration: none; font-weight: 700; margin-left: 24px; }
        .barra .marca { margin-left: 0; font-size: 1.4rem; }
        main { width: min(620px, 100%); text-align: center; }
        h1 {
            margin-bottom: 22px;
            font-size: clamp(2rem, 5vw, 3.2rem);
            letter-spacing: 0.06em;
        }
        .contenedor {
            width: min(400px, 100%);
            height: 700px;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 8px;
            overflow: hidden;
            margin: 0 auto;
            position: relative;
            background: #121821;
            box-shadow: 0 24px 60px rgba(0,0,0,0.45);
            transform: translateZ(0);
        }
        .cielo {
            width: 720px;
            position: absolute;
            left: -160px;
            top: 0;
            z-index: 1;
            animation: cielo 28s ease-in-out infinite alternate;
            will-change: transform, filter;
        }
        .paisaje {
            width: 820px;
            position: absolute;
            left: -170px;
            top: 0;
            z-index: 2;
            animation: paisaje 24s ease-in-out infinite alternate;
            will-change: transform, filter;
        }
        .vapor {
            width: 200%;
            position: absolute;
            z-index: 4;
            top: 400px;
            left: 0;
            opacity: 0.88;
            animation: vapor 16s linear infinite alternate;
            will-change: transform;
        }
        .persona {
            width: 800px;
            position: absolute;
            left: -200px;
            top: 250px;
            z-index: 3;
            animation: persona 18s ease-in-out infinite alternate;
            will-change: transform, filter;
        }
        @keyframes cielo {
            from { filter: blur(4px); transform: scale(1); }
            to { filter: blur(0); transform: scale(1.18); }
        }
        @keyframes paisaje {
            from { transform: translateY(0) scale(1); filter: blur(2px); }
            to { transform: translateY(-40px) scale(1.04); filter: blur(0); }
        }
        @keyframes vapor {
            from { transform: translateX(0); }
            to { transform: translateX(-220px); }
        }
        @keyframes persona {
            from { filter: grayscale(80%); transform: translateY(0) scale(0.84); }
            to { filter: grayscale(0%); transform: translateY(-46px) scale(1.1); }
        }
        @media (max-width: 620px) {
            .barra { padding: 0 18px; }
            .barra a { margin-left: 12px; font-size: 0.9rem; }
            .contenedor { transform: scale(0.9); transform-origin: top center; }
        }
    </style>
</head>
<body>
    <nav class="barra">
        <a class="marca" href="../../index.html#main">Luis</a>
        <div class="enlaces-portafolio">
            <a href="../../index.html#main">Inicio</a>
            <a href="../../index.html#about">Sobre mí</a>
            <a class="regresar" href="../../index.html#proyectos">Volver a proyectos</a>
        </div>
    </nav>
    <main>
        <h1>Paisajes</h1>
        <div class="contenedor">
            <img class="cielo" src="img/CIELO.jpg" alt="Cielo">
            <img class="paisaje" src="img/PAISAJE.png" alt="Paisaje">
            <img class="persona" src="img/PERSONA.png" alt="Persona">
            <img class="vapor" src="img/VAPOR.png" alt="Vapor">
        </div>
    </main>
</body>
</html>
