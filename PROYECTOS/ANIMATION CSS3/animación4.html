<html>
    <head>
        <title>Megaman animado</title>
        <link rel="stylesheet" href="../estilo-proyecto.css">

        <style>
            *{
                margin:0;
                padding:0;
            }
            #contenedor{
                width: 400px;
                height: 200px;
                border: 1px solid black;
                position:relative;
                margin:0 auto; /*centrar el contenedor*/   
                overflow: hidden; /*OCULTA TODO LO QUE CONTIENE*/ 
                background-image: url("ASSETS/back.gif");    
                background-size: cover;

            }
            #cuadrito{
                width: 100px;
                height: 100px;
                position: absolute;/*OBLIGATORIO PARA MOVER EL DIV*/
                top: 50px;
                left: 500px;

                animation: cuadrito 3s infinite;
                animation-timing-function: linear;/*define la forma de moverse*/

            }
            @keyframes cuadrito{
                from{
                    left: -100px;
                }
                to{
                    left: 500px;
                }
            }
            #cuadrito img{
                width: 100px;
                height: 100px;
            }
        </style>
</head>
<body>
    <a class="regresar" href="../../index.html#proyectos">Volver a proyectos</a>
    <div id="contenedor">


        <div id="cuadrito">

            <img src="ASSETS\megaman.gif" alt="">
            
        </div>
        

    </div>
</div>
</body>
</html>
