<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payaso animado</title>
    <link rel="stylesheet" href="../estilo-proyecto.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            padding: 96px 20px 34px;
            display: grid;
            place-items: center;
            overflow-x: hidden;
            font-family: Arial, Helvetica, sans-serif;
            color: white;
            background:
                radial-gradient(circle at 50% 15%, rgba(255, 219, 91, 0.2), transparent 28%),
                linear-gradient(135deg, #2b1043, #090712 58%, #1b0b26);
        }
        .barra {
            position: fixed;
            inset: 0 0 auto 0;
            z-index: 20;
            height: 68px;
            padding: 0 8%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.78);
            backdrop-filter: blur(10px);
        }
        .barra a { color: white; text-decoration: none; font-weight: 700; margin-left: 24px; }
        .barra .marca { margin-left: 0; font-size: 1.4rem; }
        .escena {
            width: min(520px, 100%);
            display: grid;
            place-items: center;
        }
        .pista {
            position: relative;
            width: min(420px, 86vw);
            aspect-ratio: 4 / 5;
            margin: auto;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 8px;
            background:
                linear-gradient(rgba(20,8,32,0.3), rgba(20,8,32,0.72)),
                url("img/fondo.png") center / cover;
            box-shadow: 0 26px 70px rgba(0,0,0,0.48);
        }
        .pista::before {
            content: "";
            position: absolute;
            left: 10%;
            right: 10%;
            bottom: 6%;
            height: 12%;
            border-radius: 50%;
            background: rgba(0,0,0,0.36);
            filter: blur(10px);
        }
        .payaso {
            position: absolute;
            inset: 10% 10% 4%;
            animation: saludo 3.4s ease-in-out infinite;
            transform-origin: 50% 88%;
        }
        .gorro {
            position: absolute;
            z-index: 5;
            width: 29%;
            height: 24%;
            left: 35.5%;
            top: 0;
            clip-path: polygon(50% 0, 3% 100%, 97% 100%);
            background: url("img/gorro2.jpg") center / cover;
            filter: saturate(1.2);
        }
        .gorro::after {
            content: "";
            position: absolute;
            width: 18%;
            aspect-ratio: 1;
            left: 41%;
            top: 1%;
            border-radius: 50%;
            background: #ffd85a;
        }
        .cara {
            position: absolute;
            z-index: 4;
            width: 31%;
            aspect-ratio: 1;
            left: 34.5%;
            top: 18%;
            clip-path: circle(49%);
            background: url("img/cara2.webp") center / cover;
            box-shadow: 0 0 0 7px rgba(255,255,255,0.82);
        }
        .cuerpo {
            position: absolute;
            z-index: 2;
            width: 48%;
            height: 43%;
            left: 26%;
            top: 43%;
            clip-path: polygon(32% 0, 68% 0, 88% 100%, 12% 100%);
            background: url("img/cuerpo.jpg") center / cover;
        }
        .brazo {
            position: absolute;
            z-index: 1;
            width: 32%;
            height: 10%;
            top: 51%;
            background: url("img/cuerpo.jpg") center / cover;
        }
        .brazo-izquierdo {
            left: 7%;
            clip-path: polygon(22% 0, 100% 0, 100% 100%, 22% 100%, 0 50%);
            transform: rotate(15deg);
            animation: brazoIzquierdo 2s ease-in-out infinite;
            transform-origin: right center;
        }
        .brazo-derecho {
            right: 7%;
            clip-path: polygon(0 0, 78% 0, 100% 50%, 78% 100%, 0 100%);
            transform: rotate(-28deg);
            animation: brazoDerecho 1.2s ease-in-out infinite;
            transform-origin: left center;
        }
        .zapato {
            position: absolute;
            z-index: 3;
            width: 30%;
            height: 18%;
            top: 79%;
            clip-path: ellipse(48% 28% at 50% 52%);
            background: url("img/zapato.jpg") center / cover;
        }
        .zapato-izquierdo { left: 20%; transform: rotate(-8deg); }
        .zapato-derecho { right: 20%; transform: rotate(8deg); }
        .confeti { position: absolute; inset: 0; pointer-events: none; }
        .confeti span {
            position: absolute;
            width: 8px;
            height: 18px;
            background: var(--color);
            animation: caer 4s linear infinite;
            animation-delay: var(--retraso);
            left: var(--x);
            top: -24px;
        }
        @keyframes saludo {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }
        @keyframes brazoIzquierdo {
            50% { transform: rotate(24deg); }
        }
        @keyframes brazoDerecho {
            50% { transform: rotate(-52deg); }
        }
        @keyframes caer {
            to { transform: translateY(580px) rotate(540deg); }
        }
        @media (max-width: 760px) {
            body { padding-inline: 16px; }
            .escena { width: 100%; }
            .pista { width: min(350px, 100%); }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; }
        }
    </style>
</head>
<body>
    <nav class="barra">
        <a class="marca" href="../../index.html#main">Luis</a>
        <div class="enlaces-portafolio">
            <a href="../../index.html#main">Inicio</a>
            <a href="../../index.html#about">Sobre mí</a>
            <a class="regresar" href="../../index.html#proyectos">Volver a proyectos</a>
        </div>
    </nav>
    <main class="escena">
        <div class="pista" aria-label="Payaso animado saludando">
            <div class="confeti" aria-hidden="true">
                <span style="--x:10%;--retraso:-1s;--color:#ff5d8f"></span>
                <span style="--x:24%;--retraso:-3s;--color:#ffd85a"></span>
                <span style="--x:40%;--retraso:-2s;--color:#62e8cf"></span>
                <span style="--x:61%;--retraso:-0.4s;--color:#8ea7ff"></span>
                <span style="--x:78%;--retraso:-2.6s;--color:#ff5d8f"></span>
                <span style="--x:91%;--retraso:-1.8s;--color:#ffd85a"></span>
            </div>
            <div class="payaso">
                <div class="gorro"></div>
                <div class="cara"></div>
                <div class="cuerpo"></div>
                <div class="brazo brazo-izquierdo"></div>
                <div class="brazo brazo-derecho"></div>
                <div class="zapato zapato-izquierdo"></div>
                <div class="zapato zapato-derecho"></div>
            </div>
        </div>
    </main>
</body>
</html>
