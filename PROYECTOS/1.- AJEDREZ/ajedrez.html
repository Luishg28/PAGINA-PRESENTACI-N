<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajedrez</title>
    <link rel="stylesheet" href="../estilo-proyecto.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background:
                radial-gradient(circle at top, rgba(142,74,45,0.55), transparent 40%),
                linear-gradient(135deg, #1a0f0b, #070504);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 40px;
        }
        .barra {
            position: fixed;
            inset: 0 0 auto 0;
            height: 68px;
            padding: 0 8%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.78);
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .barra a { color: white; text-decoration: none; font-weight: 700; margin-left: 24px; }
        .barra .marca { margin-left: 0; font-size: 1.4rem; }
        main { text-align: center; width: min(720px, 100%); }
        h1 {
            margin-bottom: 22px;
            font-size: clamp(2rem, 5vw, 3.2rem);
            letter-spacing: 0.08em;
        }
        .tablero {
            width: min(640px, 92vw);
            aspect-ratio: 1 / 1;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            border: 12px solid #3b2416;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 24px 60px rgba(0,0,0,0.48);
            animation: tableroEntrada 0.8s ease-out both;
        }
        .casilla { min-width: 0; }
        .clara { background: #f1dfc1; }
        .oscura { background: #3a2418; }
        @keyframes tableroEntrada {
            from { opacity: 0; transform: translateY(26px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        @media (max-width: 620px) {
            .barra { padding: 0 18px; }
            .barra a { margin-left: 12px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <nav class="barra">
        <a class="marca" href="../../index.html#main">Luis</a>
        <div class="enlaces-portafolio">
            <a href="../../index.html#main">Inicio</a>
            <a href="../../index.html#about">Sobre mí</a>
            <a class="regresar" href="../../index.html#proyectos">Volver a proyectos</a>
        </div>
    </nav>
    <main>
        <h1>Ajedrez</h1>
        <section class="tablero" aria-label="Tablero de ajedrez">
            <div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div>
            <div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div>
            <div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div>
            <div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div>
            <div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div>
            <div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div>
            <div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div>
            <div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div><div class="casilla clara"></div><div class="casilla oscura"></div>
        </section>
    </main>
</body>
</html>
