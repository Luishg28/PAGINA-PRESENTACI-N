<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abejas</title>
    <link rel="stylesheet" href="../estilo-proyecto.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: radial-gradient(circle at top, #264d2d 0%, #101909 58%, #050604 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 40px;
        }
        .barra {
            position: fixed;
            inset: 0 0 auto 0;
            height: 68px;
            padding: 0 8%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.78);
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .barra a { color: white; text-decoration: none; font-weight: 700; margin-left: 24px; }
        .barra .marca { margin-left: 0; font-size: 1.4rem; }
        main { width: min(760px, 100%); text-align: center; }
        h1 {
            margin-bottom: 22px;
            font-size: clamp(2rem, 5vw, 3.2rem);
            letter-spacing: 0.08em;
        }
        .contenedor {
            width: min(680px, 100%);
            aspect-ratio: 2 / 1;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 8px;
            position: relative;
            margin: 0 auto;
            overflow: hidden;
            background-image: url(img/campo4.webp);
            background-size: cover;
            background-position: center;
            box-shadow: 0 24px 60px rgba(0,0,0,0.45);
        }
        .contenedor::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,235,121,0.08), rgba(0,0,0,0.2));
        }
        .abeja {
            width: 58px;
            height: 58px;
            position: absolute;
            left: -70px;
            background-image: url(img/abeja2.png);
            background-size: contain;
            background-repeat: no-repeat;
            z-index: 1;
            filter: drop-shadow(0 8px 10px rgba(0,0,0,0.3));
        }
        .cuadrito1 { top: 70%; animation: vueloUno 5.5s cubic-bezier(.45,0,.55,1) infinite; }
        .cuadrito2 { top: 18%; animation: vueloDos 5.8s cubic-bezier(.45,0,.55,1) 0.45s infinite; }
        .cuadrito3 { top: 45%; animation: vueloTres 6.2s cubic-bezier(.45,0,.55,1) 0.9s infinite; }
        @keyframes vueloUno {
            0% { transform: translate(-80px, 0) rotate(-8deg); }
            35% { transform: translate(260px, -150px) rotate(18deg); }
            70% { transform: translate(520px, -40px) rotate(-10deg); }
            100% { transform: translate(760px, 40px) rotate(8deg); }
        }
        @keyframes vueloDos {
            0% { transform: translate(-80px, 0) rotate(8deg); }
            35% { transform: translate(240px, 140px) rotate(-16deg); }
            70% { transform: translate(520px, 20px) rotate(12deg); }
            100% { transform: translate(760px, -70px) rotate(-8deg); }
        }
        @keyframes vueloTres {
            0% { transform: translate(-100px, 30px) scale(0.8); }
            50% { transform: translate(330px, -60px) scale(1.08); }
            100% { transform: translate(780px, 40px) scale(0.9); }
        }
        @media (max-width: 620px) {
            .barra { padding: 0 18px; }
            .barra a { margin-left: 12px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <nav class="barra">
        <a class="marca" href="../../index.html#main">Luis</a>
        <div class="enlaces-portafolio">
            <a href="../../index.html#main">Inicio</a>
            <a href="../../index.html#about">Sobre mí</a>
            <a class="regresar" href="../../index.html#proyectos">Volver a proyectos</a>
        </div>
    </nav>
    <main>
        <h1>Abejas</h1>
        <div class="contenedor">
            <div class="abeja cuadrito1"></div>
            <div class="abeja cuadrito2"></div>
            <div class="abeja cuadrito3"></div>
        </div>
    </main>
</body>
</html>
