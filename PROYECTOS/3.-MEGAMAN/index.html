<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Megaman</title>
    <link rel="stylesheet" href="../estilo-proyecto.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: Arial, Helvetica, sans-serif;
            background: radial-gradient(circle at top, #182c4a 0%, #070912 58%, #030407 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 20px 40px;
        }
        .barra {
            position: fixed;
            inset: 0 0 auto 0;
            height: 68px;
            padding: 0 8%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.78);
            backdrop-filter: blur(10px);
            z-index: 10;
        }
        .barra a { color: white; text-decoration: none; font-weight: 700; margin-left: 24px; }
        .barra .marca { margin-left: 0; font-size: 1.4rem; }
        main { width: min(760px, 100%); text-align: center; }
        h1 {
            margin-bottom: 22px;
            font-size: clamp(2rem, 5vw, 3.2rem);
            letter-spacing: 0.08em;
        }
        #contenedor {
            width: min(680px, 100%);
            aspect-ratio: 2 / 1;
            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 8px;
            position: relative;
            margin: 0 auto;
            overflow: hidden;
            background-image: url(ASSETS/back.gif);
            background-size: cover;
            background-position: center bottom;
            box-shadow: 0 24px 60px rgba(0,0,0,0.45);
        }
        #contenedor::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(12,17,32,0.05), rgba(0,0,0,0.26));
        }
        #cuadrito {
            width: 112px;
            height: 112px;
            position: absolute;
            bottom: 32px;
            left: -120px;
            animation: megamanRun 4.8s linear infinite;
            z-index: 1;
        }
        #cuadrito img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 14px rgba(0,0,0,0.45));
        }
        @keyframes megamanRun {
            from { transform: translateX(0); }
            to { transform: translateX(820px); }
        }
        @media (max-width: 620px) {
            .barra { padding: 0 18px; }
            .barra a { margin-left: 12px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
    <nav class="barra">
        <a class="marca" href="../../index.html#main">Luis</a>
        <div class="enlaces-portafolio">
            <a href="../../index.html#main">Inicio</a>
            <a href="../../index.html#about">Sobre mí</a>
            <a class="regresar" href="../../index.html#proyectos">Volver a proyectos</a>
        </div>
    </nav>
    <main>
        <h1>Megaman</h1>
        <div id="contenedor">
            <div id="cuadrito">
                <img src="ASSETS/megaman.gif" alt="Megaman corriendo">
            </div>
        </div>
    </main>
</body>
</html>
