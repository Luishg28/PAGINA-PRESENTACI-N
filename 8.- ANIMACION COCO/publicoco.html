<html>
    <head>
        <title>COCOS</title>
        <style>
            *{
                margin:0px;
                padding: 0px;
            }
            body{
                background-color: black;
            }
            .contenedor{
                width: 400px;
                height: 700px;
                background-color: yellow;
                position: relative;
                overflow: hidden;
                margin:0 auto;
            }
            .rama{
                width: 300px;
                height: 400px;
                background-image: url(img/RAMA.png);
                background-size: cover;
                position: absolute;
                left:140px;
                top:-160px;
                rotate: 10deg;
                animation: rama 1.5s infinite alternate linear;
            }
            @keyframes rama {
                from{
                    rotate:10deg;
                }
                to{
                    rotate:22deg;
                }
            }
            .cuadrito1{
                width: 200px;
                height: 200px;
                position: absolute;
                background-image: url(img/mitad_coco2.png);
                background-size: cover;
                top:-200px;
                left: 250px;
                z-index: 1;
                animation: cuadrito1 8s forwards;
            }
            @keyframes cuadrito1{
                0%{
                    top:-100px;
                }
                20%, 40%, 60%, 80%{
                    top:550px;
                    rotate:0deg;
                }
                100%{
                    top:700px;
                    rotate:0deg;
                }
            }
            .cuadrito2{
                height: 100px;
                width: 100px;
                background-image: url(img/mitad_coco2.png);
                background-size: cover;
                position: absolute;
                z-index: 1;
                left:200px;
                top:-100px;
                animation: cuadrito2 7s forwards 3s;
            }
            @keyframes cuadrito2{
                0%{
                    top:-100px;
                }
                20%, 40%, 60%, 80%{
                    top:390px;
                    rotate: 10deg;
                }
                100%{
                    top:700px;
                    rotate:0deg;
                }
            }
            .cuadrito3{
                height: 100px;
                width: 100px;
                background-image: url(img/mitad_coco.png);
                background-size: cover;
                position: absolute;
                z-index: 1;
                left:50px;
                top:-100px;
                animation: cuadrito3 7s forwards 3s;
            }
            @keyframes cuadrito3{
                0%{
                    top:-100px;
                }
                20%, 40%, 60%, 80%{
                    top:560px;
                    rotate: 10deg;
                }
                100%{
                    top:700px;
                    rotate:0deg;
                }
            }
            .cuadrito4{
                height: 100px;
                width: 100px;
                background-image: url(img/COCO3.png);
                background-size: cover;
                position: absolute;
                z-index: 1;
                left:50px;
                top:-100px;
                animation: cuadrito4 7s forwards 4s;
            }
            @keyframes cuadrito4{
                0%{
                    top:-100px;
                }
                20%, 40%, 60%, 80%{
                    top:20px;
                    rotate:0deg;
                }
                100%{
                    top:700px;
                    rotate:0deg;
                }
            }
            .cuadrito5{
                height: 100px;
                width: 100px;
                background-image: url(img/mitad_coco.png);
                background-size: cover;
                position: absolute;
                z-index: 1;
                left:100px;
                top:-100px;
                animation: cuadrito5 7s forwards 5s;
            }
            @keyframes cuadrito5{
                0%{
                    top:-100px;
                }
                20%, 40%, 60%, 80%{
                    top:180px;
                    rotate:-10deg;
                }
                100%{
                    top:700px;
                    rotate:0deg;
                }
            }
            .cuadrito6{
                width: 100px;
                height: 100px;
                background-image: url(img/COCO5.png);
                background-size: cover;
                position: absolute;
                z-index: 1;
                left:250px;
                top:-100px;
                rotate: 10deg;
                animation: cuadrito6 7s forwards 5s;
            }
            @keyframes cuadrito6{
                0%{
                    top:-100px;
                }
                20%, 40%, 60%, 80%{
                    top: 10px;
                    rotate:0deg;
                }
                100%{
                    top: 700px;
                    rotate:0deg;
                }
            }
            .text1{
                width: 400px;
                height: 35px;
                font-size: 20px;
                color: #60340d;
                position: absolute;
                text-align: left;
                top: 300px;
                left: -400px;
                animation: text1 8s forwards linear;
            }
            @keyframes text1{
                0%{
                    left:-400px;
                }
                20%, 40%, 60%, 80% {
                    left: 50px;
                }
                100%{
                    left: 400px;
                }
            }
            .text2{
                width: 400px;
                height: 70px;
                font-size: 40px;
                color: #fffffb;
                position: absolute;
                top: 320px;
                left: -400px;
                animation: text2 9s forwards linear 1s;
            }
            @keyframes text2{
                0%{
                    left:-400px;
                }
                20%, 40%, 60%, 80% {
                    left: 50px;
                }
                100%{
                    left: 400px;
                }
            }
            .text3{
                width: 400px;
                height: 70px;
                font-size: 40px;
                color: #fffffb;
                position: absolute;
                top: 365px;
                left: -400px;
                animation: text3 10s forwards linear 2s;
            }
            @keyframes text3{
                0%{
                    left:-400px;
                }
                20%, 40%, 60%, 80% {
                    left: 50px;
                }
                100%{
                    left: 400px;
                }
            }
            .text4{
                width: 400px;
                text-align: center;
                height: 160px;
                font-size: 70px;
                color: #fffffb;
                position: absolute;
                top: 210px;
                /* background-color: red; */
                left: 400px;
                animation: text4 3s linear 12s forwards;
            }
            @keyframes text4{
                0%{
                    left:400px;
                }
                20%, 40%,60%, 80% {
                    top: 210px;
                    left: 0px;
                }
                100%{
                    top: 140px;
                    left: 0px;
                }
            }
            .text5{
                width: 400px;
                height: 100px;
                font-size: 40px;
                /* background-color: rebeccapurple; */
                text-align: center;
                position: absolute;
                top: 300px;
                z-index: 1;
                left: 400px;
                animation: text5 2s linear 13s forwards;
                color: #60340d;
            }
            @keyframes text5{
                0%{
                    left:400px;
                }
                20%, 40%, 60%, 80% {
                    left: 0px;
                }
                100%{
                    left: 0px;
                }
            }
            .text6{
                width: 400px;
                height: 90px;
                font-size: 40px;
                color: #fffffb;
                text-align: center;
                position: absolute;
                top: 360px;
                /* background-color: red; */
                left: 400px;
                animation: text6 1s linear 14s forwards;
            }
            @keyframes text6{
                0%{
                    left:400px;
                }
                20%, 40%, 60%, 80%{
                    top: 360px;
                    left: 0px;
                }
                100%{
                    top: 470px;
                    left: 0px;
                }
            }
            .cuadrito7{
                width: 400px;
                height: 250px;
                position: absolute;
                background-size: cover;
                top: 235px;
                background-image: url(img/coco.png);
                opacity: 0;
                z-index: 2;
                animation: cuadrito7 1s linear 15s forwards;
            }
            @keyframes cuadrito7{
                0%{
                    left:400px;
                    opacity: 0;
                }
                20%, 40%, 60%, 80% {
                    transition: 2s;
                    top: 235px;
                    opacity: 1;
                }
                100%{
                    opacity: 1;
                }
            }
            .musica{
                display: none;
            }
        </style>
    </head>
    <body>
        <div class="contenedor">
            <div class="rama"></div>
            <div class="cuadrito1"></div>
            <div class="cuadrito2"></div>          
            <div class="cuadrito3"></div>            
            <div class="cuadrito4"></div>            
            <div class="cuadrito5"></div> 
            <div class="cuadrito6"></div> 
            <div class="text1"><h2>YA PROBASTE</h2></div>
            <div class="text2"><h2>EL - NUEVO</h2></div>
            <div class="text3"><h2>SABOR</h2></div>          
            <div class="text4"><h1>COCO</h1></div>
            <div class="text5"><h1>+</h1></div>
            <div class="text6"><h1>VAINILLA</h1></div>          
            <div class="cuadrito7"></div>     
        </div>
    </body>
</html>
