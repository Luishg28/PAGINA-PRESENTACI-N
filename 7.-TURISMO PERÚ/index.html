<html>
<head>
<title>TURISMO PERÚ</title>
<style>
    *{
        padding: 0px;
        margin: 0px;
    }
    .contenedor{
        width: 800px;
        height: 300px;
        border: 1px solid black;
        margin:0 auto;
        position: relative;
        overflow: hidden;
    }
    .tarjeta1, .tarjeta2, .tarjeta3, .tarjeta4{
        width: 200px;
        height: 300px;
        position: absolute;
        top: -300px;
        background-size: cover;
    }
    .tarjeta1{
        background-image: url(img/mar.jpg);        
        left: 0px;
        animation: tarjeta1 3s 1 forwards ;
        
    }
    .tarjeta2{
        background-image: url(img/costa.jpg);        
        left: 200px;
        animation: tarjeta1 3s 1 forwards 3s;
    }
    .tarjeta3{
        background-image: url(img/sierra.jpg);        
        left: 400px;
        animation: tarjeta1 3s 1 forwards 6s;
    }
    .tarjeta4{
        background-image: url(img/selva.jpg);        
        left: 600px;
        animation: tarjeta1 3s 1 forwards 9s;
    }
    /*ANIMACIONES*/

    @keyframes tarjeta1{
        0%{
            top:-300px;
            transform: rotateY(180deg);
        }
        50%{
            top:300px;
        }
        100%{
            top:0px;
        }
    }
