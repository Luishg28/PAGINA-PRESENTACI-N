<html>
<head>
<title>LENGUAJES DE PROGRAMACIÓN</title>
<Style>
    *{
        margin: 0px;
        padding: 0px;
    }
    .contenedor{
        width: 600px;
        height: 300px;
        border: 1px solid black;
        margin: auto;
        position: relative;
        overflow: hidden;
    }
    .html5, .CSS3, .Java{
        width: 200px;
        height: 300px;
        position: absolute;
        top: 0px;
        background-size: cover;
    }
    .html5{
        background-image: url(img/html5.jpg);        
        left: 0px;
        animation: html5 3s 1 forwards 3s;
        
    }
    .CSS3{
        background-image: url(img/css3.jpg);        
        left: 200px;
        animation: CSS3 3s 1 forwards;
    }
    .Java{
        background-image: url(img/java.jpg);        
        left: 400px;
        animation: Java 3s 1 forwards 6s;
    }
    @keyframes CSS3{
        0%{
            top:-300px;
            transform: rotateY(360deg);
        }
        50%{
            top:300px;
        }
        100%{
            top:0px;
        }
    }
    @keyframes html5{
        0%{
            bottom: 300px;
            transform: rotateY(360deg);
        }
        50%{
            bottom:-300px
        }
        100%{
            bottom:0px;
        }
    }
    @keyframes Java{
        0%{
            bottom:300px;
            transform: rotateY(360deg);
        }
        50%{
            bottom:-300px
        }
        100%{
            bottom:400px;
        }    
    }
.html5:hover{
    transition: 1s;
    scale: 1.2;
    z-index: 1;
    box-shadow: 0px 0px 50px orangered;
}
.CSS3:hover{
    transition: 1s;
    scale: 1.2;
    z-index: 1;
    box-shadow: 0px 50px 50px blue;
}
.Java:hover{
    transition: 1s;
    scale: 1.2;
    z-index: 1;
    box-shadow: 0px 50px 50px yellow;
}

</Style>
</head>
<body>
    <h1>ANIMACION 3</h1>
    <a href="../index.html">VOLVER</a>
    <div class="contenedor">
        <div class="html5"></div>
        <div class="CSS3"></div>
        <div class="Java"></div>

    </div>
</body>
</html>
